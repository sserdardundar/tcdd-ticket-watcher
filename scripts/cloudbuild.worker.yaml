steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/tcdd-worker', '-f', 'Dockerfile.worker', '.']
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/tcdd-worker']
    
  # Deploy container image to Cloud Run Job (Update existing)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'update'
      - 'tcdd-worker'
      - '--image'
      - 'gcr.io/$PROJECT_ID/tcdd-worker'
      - '--region'
      - 'europe-west1'
      - '--max-retries'
      - '0'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - '--set-secrets=TELEGRAM_BOT_TOKEN=telegram-token:latest,ADMIN_TOKEN=admin-token:latest,TELEGRAM_WEBHOOK_SECRET=telegram-webhook-secret:latest'
images:
  - 'gcr.io/$PROJECT_ID/tcdd-worker'
